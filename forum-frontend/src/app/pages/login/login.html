<h1>Login</h1>

<input type="email"
       placeholder="Email"
       [(ngModel)]="user.email">

<br><br>

<input type="password"
       placeholder="Password"
       [(ngModel)]="user.password">

<br><br>

<button (click)="login()">
  Login
</button>
<br><br>

<p>
  Don't have an account?
  <a routerLink="/register">Register now!</a>
</p>
